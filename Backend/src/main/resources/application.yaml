spring:
  application:
    name: Backend
  websocket:
    enabled: true

server:
  port: 8080
  tomcat:
    connection-timeout: 3600000
    keep-alive-timeout: 3600000

langchain4j:
  open-ai:
    chat-model:
      base-url: ${AIHUBMIX_BASE_URL}
      api-key: ${AIHUBMIX_API_KEY}
      model-name: ${AIHUBMIX_MODEL}
      temperature: 0.7
      max-tokens: 200
      log-requests: false
      log-responses: false
    streaming-chat-model:
      base-url: ${AIHUBMIX_BASE_URL}
      api-key: ${AIHUBMIX_API_KEY}
      model-name: ${AIHUBMIX_MODEL}
      temperature: 0.7
      max-tokens: 200

aliyun:
  asr:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
    app-key: ${ALIYUN_ASR_APP_KEY}