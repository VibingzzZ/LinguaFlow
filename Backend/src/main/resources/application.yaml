spring:
  application:
    name: Backend
  websocket:
    enabled: true

server:
  port: 8080

langchain4j:
  open-ai:
    chat-model:
      base-url: ${AIHUBMIX_BASE_URL:https://api.qnaigc.com/v1}
      api-key: ${AIHUBMIX_API_KEY:sk-placeholder}
      model-name: ${AIHUBMIX_MODEL:doubao-seed-1.6-flash}
      temperature: 0.7
      max-tokens: 200
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: ${AIHUBMIX_BASE_URL:https://api.qnaigc.com/v1}
      api-key: ${AIHUBMIX_API_KEY:sk-placeholder}
      model-name: ${AIHUBMIX_MODEL:doubao-seed-1.6-flash}
      temperature: 0.7
      max-tokens: 200

aliyun:
  asr:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:placeholder}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:placeholder}
    app-key: ${ALIYUN_ASR_APP_KEY:placeholder}
