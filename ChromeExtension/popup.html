<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguaFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    h1 {
      font-size: 18px;
      color: #e94560;
      margin-bottom: 16px;
      text-align: center;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
    }
    .status-dot.connected { background: #00d26a; box-shadow: 0 0 8px #00d26a80; }
    .status-dot.error { background: #e94560; }
    .status-dot.recording { background: #ff4757; animation: pulse 1.2s infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.5); }
      50% { box-shadow: 0 0 0 8px rgba(255,71,87,0); }
    }
    .status-text { font-size: 13px; }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-connect { background: #0f3460; color: #fff; }
    .btn-connect:hover:not(:disabled) { background: #1a5276; }
    .btn-record { background: #e94560; color: #fff; }
    .btn-record:hover:not(:disabled) { background: #c0392b; }
    .btn-record.recording { background: #ff4757; }
    select {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #16213e;
      color: #fff;
      font-size: 13px;
      width: 100%;
    }
    select option { background: #16213e; }
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>LinguaFlow 实时翻译</h1>
  
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">未连接</span>
  </div>

  <div class="controls">
    <button class="btn btn-connect" id="btnConnect">连接服务</button>
    <button class="btn btn-record" id="btnRecord" disabled>🎤 开始录音</button>
    <select id="audioSource">
      <option value="system">系统音频（视频声音）</option>
      <option value="microphone">麦克风</option>
    </select>
    <select id="sourceLang">
      <option value="en">英语</option>
      <option value="ja">日语</option>
      <option value="ko">韩语</option>
      <option value="fr">法语</option>
      <option value="de">德语</option>
      <option value="es">西班牙语</option>
      <option value="ru">俄语</option>
    </select>
    <select id="targetLang">
      <option value="zh">中文</option>
      <option value="en">英语</option>
      <option value="ja">日语</option>
      <option value="ko">韩语</option>
    </select>
    <label style="display:flex;align-items:center;gap:8px;padding:8px;background:#16213e;border-radius:8px;font-size:13px;cursor:pointer;">
      <input type="checkbox" id="ttsToggle" checked style="width:16px;height:16px;cursor:pointer;">
      <span>🔊 TTS语音朗读</span>
    </label>
  </div>

  <div class="footer">
    基于 Spring Boot + 阿里云ASR + OpenAI
  </div>

  <script src="popup.js"></script>
</body>
</html>
